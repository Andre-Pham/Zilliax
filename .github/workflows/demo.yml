name: Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Install Mint
        run: |
          brew install mint
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

      - name: Install Tools
        run: |
          mint install nicklockwood/SwiftFormat@0.60.1
          mint install realm/SwiftLint@0.63.2
          mint install cpisciotta/xcbeautify@3.2.1

      - name: Version Log
        run: |
          echo "### Xcode"
          xcodebuild -version
          echo "### Swift version"
          xcrun swift --version
          echo "### SwiftFormat"
          swiftformat --version
          echo "### SwiftLint"
          swiftlint version
          echo "### xcbeautify"
          xcbeautify --version

      - name: SwiftFormat Check
        working-directory: Demo
        run: make format-check

      - name: SwiftLint
        working-directory: Demo
        run: make lint

      - name: SwiftLint Analyze
        working-directory: Demo
        run: make lint-analyze

  build:
    name: Build
    runs-on: macos-26
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Install Mint
        run: |
          brew install mint
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

      - name: Install Tools
        run: |
          mint install cpisciotta/xcbeautify@3.2.1

      - name: Version Log
        run: |
          echo "### Xcode"
          xcodebuild -version
          echo "### Swift version"
          xcrun swift --version
          echo "### xcbeautify"
          xcbeautify --version

      - name: Build
        working-directory: Demo
        run: make build
