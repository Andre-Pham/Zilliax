name: Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Install Tools
        run: brew install swiftformat swiftlint xcbeautify

      - name: Version Log
        run: |
          echo "### Xcode"
          xcodebuild -version
          echo "### SwiftFormat"
          swiftformat --version
          echo "### SwiftLint"
          swiftlint version
          echo "### xcbeautify"
          xcbeautify --version

      - name: SwiftFormat Check
        working-directory: Demo
        run: make format-check

      - name: SwiftLint
        working-directory: Demo
        run: make lint

      - name: SwiftLint Analyze
        working-directory: Demo
        run: make lint-analyze

  build:
    name: Build
    runs-on: macos-26
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Install Tools
        run: brew install xcbeautify

      - name: Version Log
        run: |
          echo "### Xcode"
          xcodebuild -version
          echo "### xcbeautify"
          xcbeautify --version

      - name: Build
        working-directory: Demo
        run: make build
